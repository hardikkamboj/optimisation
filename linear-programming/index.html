<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Programming</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        body { display: flex; height: 100vh; }
        .canvas-container { flex: 1; }
        canvas { display: block; width: 100%; height: 100%; }
        .back-link { display: inline-block; color: #e94560; text-decoration: none; font-size: 0.85rem; margin-bottom: 15px; }
        .add-row { display: flex; gap: 4px; margin: 5px 0; align-items: center; }
        .add-row input { flex: 1; padding: 6px; font-size: 0.85rem; }
        .add-row label { color: #888; font-size: 0.8rem; min-width: 18px; }
        .ineq-type { display: flex; border-radius: 4px; overflow: hidden; border: 1px solid #0f3460; margin: 8px 0; }
        .ineq-btn { flex: 1; padding: 6px; border: none; border-radius: 0; background: #1a1a2e; color: #888; font-size: 0.8rem; cursor: pointer; transition: all 0.3s; margin: 0 !important; width: auto !important; }
        .ineq-btn.active { background: #e94560; color: #fff; }
        .ineq-btn:hover:not(.active) { background: #0f3460; }
        .constraint-list { max-height: 160px; overflow-y: auto; margin: 8px 0; }
        .constraint-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; margin: 4px 0; background: #1a1a2e; border-radius: 4px; font-size: 0.82rem; font-family: 'Courier New', monospace; color: #0f9b8e; }
        .constraint-item .remove-btn { margin-left: auto; background: none; border: none; color: #e94560; cursor: pointer; font-size: 1rem; padding: 0 4px; width: auto !important; margin-top: 0; margin-bottom: 0; }
        .constraint-item .remove-btn:hover { color: #ff6b6b; background: none; }
        .status-text { color: #888; font-size: 0.85rem; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="../" class="back-link">&larr; Back</a>
        <h1>Linear Programming</h1>

        <h2>Objective Function</h2>
        <p style="color:#888; font-size:0.85rem; margin-bottom:8px;">f(x₁, x₂) = c₁x₁ + c₂x₂</p>
        <div class="add-row">
            <label>c₁</label>
            <input type="number" id="c1" value="1" step="0.1">
        </div>
        <div class="add-row">
            <label>c₂</label>
            <input type="number" id="c2" value="1" step="0.1">
        </div>

        <h2>Constraints</h2>
        <div class="add-row">
            <label>a₁</label>
            <input type="number" id="inp-a1" value="1" step="0.1">
        </div>
        <div class="add-row">
            <label>a₂</label>
            <input type="number" id="inp-a2" value="0" step="0.1">
        </div>
        <div class="add-row">
            <label>b</label>
            <input type="number" id="inp-b" value="3" step="0.1">
        </div>
        <div class="ineq-type">
            <button class="ineq-btn active" id="ineq-leq">aᵀx ≤ b</button>
            <button class="ineq-btn" id="ineq-geq">aᵀx ≥ b</button>
        </div>
        <button id="btn-add">Add Constraint</button>
        <button id="btn-random">Add Random Constraint</button>
        <p class="status-text">Constraints: <span id="constraint-count">0</span></p>
        <div class="constraint-list" id="constraint-list"></div>
        <button id="btn-clear">Clear All</button>

        <div class="legend" style="margin-top: 16px;">
            <div class="legend-item">
                <div class="legend-color" style="background: #ffcc00;"></div>
                <span>Level curves  f = k</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: rgba(0,255,136,0.3);"></div>
                <span>Feasible region</span>
            </div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="../shared/draggable-rect.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const SCALE = 50;

        // ── State ─────────────────────────────────────────────────
        let constraints = [];
        let ineqType = 'leq';

        const LINE_COLORS = ['#e94560','#ff6b6b','#ffa502','#ff6348','#7bed9f','#70a1ff','#5352ed','#a29bfe','#fd79a8','#00cec9','#e17055','#6c5ce7'];

        // ── Helpers ───────────────────────────────────────────────
        function origin() { return { x: canvas.width / 2, y: canvas.height / 2 }; }
        function toCanvas(wx, wy) { const o = origin(); return { x: o.x + wx * SCALE, y: o.y - wy * SCALE }; }
        function toWorld(px, py)  { const o = origin(); return { x: (px - o.x) / SCALE, y: (o.y - py) / SCALE }; }

        // ── Polyhedron (Sutherland-Hodgman) ───────────────────────
        function clipPolygon(polygon, a1, a2, b) {
            if (polygon.length === 0) return [];
            const out = [];
            for (let i = 0; i < polygon.length; i++) {
                const curr = polygon[i], next = polygon[(i + 1) % polygon.length];
                const cIn = a1 * curr.x + a2 * curr.y <= b + 1e-9;
                const nIn = a1 * next.x + a2 * next.y <= b + 1e-9;
                const d1 = a1 * curr.x + a2 * curr.y - b, d2 = a1 * next.x + a2 * next.y - b;
                const t = d1 / (d1 - d2);
                const ix = { x: curr.x + t * (next.x - curr.x), y: curr.y + t * (next.y - curr.y) };
                if (cIn && nIn)       out.push(next);
                else if (cIn && !nIn) out.push(ix);
                else if (!cIn && nIn) { out.push(ix); out.push(next); }
            }
            return out;
        }

        function computePolyhedron() {
            // rect constraints are always included; user constraints are optional extra cuts
            const allConstraints = [...rect.getConstraints(), ...constraints];
            const BIG = 50;
            let poly = [{ x:-BIG, y:-BIG }, { x:BIG, y:-BIG }, { x:BIG, y:BIG }, { x:-BIG, y:BIG }];
            for (const c of allConstraints) {
                const s = c.type === 'geq' ? -1 : 1;
                poly = clipPolygon(poly, s * c.a1, s * c.a2, s * c.b);
                if (poly.length === 0) return [];
            }
            return poly;
        }

        // ── Constraint UI ─────────────────────────────────────────
        const ineqLeq = document.getElementById('ineq-leq');
        const ineqGeq = document.getElementById('ineq-geq');
        ineqLeq.addEventListener('click', () => { ineqType = 'leq'; ineqLeq.classList.add('active'); ineqGeq.classList.remove('active'); });
        ineqGeq.addEventListener('click', () => { ineqType = 'geq'; ineqGeq.classList.add('active'); ineqLeq.classList.remove('active'); });

        document.getElementById('btn-add').addEventListener('click', () => {
            const a1 = parseFloat(document.getElementById('inp-a1').value) || 0;
            const a2 = parseFloat(document.getElementById('inp-a2').value) || 0;
            const b  = parseFloat(document.getElementById('inp-b').value)  || 0;
            addConstraint(a1, a2, b, ineqType);
        });

        document.getElementById('btn-random').addEventListener('click', () => {
            const poly = computePolyhedron();
            if (poly.length < 3) return;
            // Pick a point blended toward a random vertex, add a cutting halfspace through it
            const cx = poly.reduce((s, p) => s + p.x, 0) / poly.length;
            const cy = poly.reduce((s, p) => s + p.y, 0) / poly.length;
            const vi = Math.floor(Math.random() * poly.length);
            const t  = 0.2 + Math.random() * 0.6;
            const px = cx + t * (poly[vi].x - cx);
            const py = cy + t * (poly[vi].y - cy);
            const angle = Math.random() * Math.PI * 2;
            const a1 = parseFloat(Math.cos(angle).toFixed(2));
            const a2 = parseFloat(Math.sin(angle).toFixed(2));
            const b  = parseFloat((a1 * px + a2 * py).toFixed(1));
            addConstraint(a1, a2, b, 'leq');
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            constraints = [];
            updateList();
            draw();
        });

        function addConstraint(a1, a2, b, type) {
            if (Math.abs(a1) < 1e-10 && Math.abs(a2) < 1e-10) return;
            constraints.push({ a1, a2, b, type });
            updateList();
            draw();
        }

        function updateList() {
            document.getElementById('constraint-count').textContent = constraints.length;
            const el = document.getElementById('constraint-list');
            el.innerHTML = '';
            constraints.forEach((c, i) => {
                const s2 = c.a2 >= 0 ? '+' : '−';
                const ineqSign = c.type === 'leq' ? '≤' : '≥';
                const div = document.createElement('div');
                div.className = 'constraint-item';
                div.innerHTML = `<span>${c.a1.toFixed(1)}x₁ ${s2} ${Math.abs(c.a2).toFixed(1)}x₂ ${ineqSign} ${c.b.toFixed(1)}</span>
                                 <button class="remove-btn" data-idx="${i}">&times;</button>`;
                el.appendChild(div);
            });
            el.querySelectorAll('.remove-btn').forEach(btn =>
                btn.addEventListener('click', e => {
                    constraints.splice(parseInt(e.target.dataset.idx), 1);
                    updateList(); draw();
                })
            );
        }

        // ── Draw ──────────────────────────────────────────────────
        function draw() {
            const W = canvas.width, H = canvas.height;
            const o = origin();
            const c1 = parseFloat(document.getElementById('c1').value) || 0;
            const c2 = parseFloat(document.getElementById('c2').value) || 0;
            const rX = Math.ceil(W / SCALE / 2);
            const rY = Math.ceil(H / SCALE / 2);

            ctx.clearRect(0, 0, W, H);

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
            for (let x = o.x % SCALE; x < W; x += SCALE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
            for (let y = o.y % SCALE; y < H; y += SCALE) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

            // Axes
            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, o.y); ctx.lineTo(W, o.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(o.x, 0); ctx.lineTo(o.x, H); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '13px sans-serif';
            ctx.fillText('x₁', W - 20, o.y - 8);
            ctx.fillText('x₂', o.x + 8, 12);

            // Ticks
            ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '10px sans-serif';
            for (let i = -rX; i <= rX; i++) {
                if (i === 0) continue;
                const px = o.x + i * SCALE;
                ctx.beginPath(); ctx.moveTo(px, o.y - 3); ctx.lineTo(px, o.y + 3);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.stroke();
                ctx.fillText(i, px - 4, o.y + 14);
            }
            for (let i = -rY; i <= rY; i++) {
                if (i === 0) continue;
                const py = o.y - i * SCALE;
                ctx.beginPath(); ctx.moveTo(o.x - 3, py); ctx.lineTo(o.x + 3, py);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.stroke();
                ctx.fillText(i, o.x + 6, py + 4);
            }

            // ── Level curves ──────────────────────────────────────
            if (Math.abs(c1) > 1e-10 || Math.abs(c2) > 1e-10) {
                const mag  = Math.sqrt(c1 * c1 + c2 * c2);
                const step = Math.max(0.5, parseFloat(mag.toFixed(1)));
                const maxK = Math.abs(c1) * rX + Math.abs(c2) * rY + step * 2;

                for (let k = -maxK; k <= maxK; k += step) {
                    let p1, p2;
                    if (Math.abs(c2) > 1e-10) {
                        p1 = toCanvas(-rX - 1, (k - c1 * (-rX - 1)) / c2);
                        p2 = toCanvas( rX + 1, (k - c1 * ( rX + 1)) / c2);
                    } else {
                        const x1 = k / c1;
                        p1 = toCanvas(x1, -rY - 1);
                        p2 = toCanvas(x1,  rY + 1);
                    }
                    const isZero = Math.abs(k) < step * 0.5;
                    ctx.strokeStyle = isZero ? 'rgba(255,204,0,0.7)' : 'rgba(255,204,0,0.2)';
                    ctx.lineWidth   = isZero ? 2 : 1;
                    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

                    // label every 3rd curve
                    if (Math.round(k / step) % 3 === 0) {
                        let lx = Math.abs(c2) > 1e-10 ? rX - 1.5 : k / c1;
                        let ly = Math.abs(c2) > 1e-10 ? (k - c1 * lx) / c2 : rY - 1.5;
                        const lp = toCanvas(lx, ly);
                        if (lp.x >= 0 && lp.x <= W && lp.y >= 0 && lp.y <= H) {
                            ctx.fillStyle = 'rgba(255,204,0,0.55)'; ctx.font = '10px sans-serif';
                            ctx.fillText(Number.isInteger(k) ? k : k.toFixed(1), lp.x + 4, lp.y - 3);
                        }
                    }
                }

                // Gradient arrow ∇f
                const gx = (c1 / mag) * 1.5, gy = (c2 / mag) * 1.5;
                const p0 = toCanvas(0, 0), p1 = toCanvas(gx, gy);
                ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.stroke();
                const ang = Math.atan2(p1.y - p0.y, p1.x - p0.x);
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p1.x - 10 * Math.cos(ang - Math.PI/6), p1.y - 10 * Math.sin(ang - Math.PI/6));
                ctx.lineTo(p1.x - 10 * Math.cos(ang + Math.PI/6), p1.y - 10 * Math.sin(ang + Math.PI/6));
                ctx.closePath(); ctx.fill();
                ctx.font = 'bold 12px sans-serif';
                ctx.fillText('∇f', p1.x + 6, p1.y - 4);
            }

            // ── Feasible region ───────────────────────────────────
            const poly = computePolyhedron();
            if (poly.length >= 3) {
                // Fill
                ctx.beginPath();
                const f0 = toCanvas(poly[0].x, poly[0].y);
                ctx.moveTo(f0.x, f0.y);
                for (let i = 1; i < poly.length; i++) { const p = toCanvas(poly[i].x, poly[i].y); ctx.lineTo(p.x, p.y); }
                ctx.closePath();
                ctx.fillStyle = 'rgba(0,255,136,0.12)'; ctx.fill();

                // Border
                ctx.beginPath();
                ctx.moveTo(f0.x, f0.y);
                for (let i = 1; i < poly.length; i++) { const p = toCanvas(poly[i].x, poly[i].y); ctx.lineTo(p.x, p.y); }
                ctx.closePath();
                ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 2; ctx.stroke();

                // Vertices
                for (const v of poly) {
                    if (Math.abs(v.x) > 49 || Math.abs(v.y) > 49) continue;
                    const p = toCanvas(v.x, v.y);
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#00ff88'; ctx.fill();
                }
            }

            // ── Optimal point ─────────────────────────────────────
            if (poly.length >= 3 && (Math.abs(c1) > 1e-10 || Math.abs(c2) > 1e-10)) {
                const realVerts = poly.filter(v => Math.abs(v.x) < 49 && Math.abs(v.y) < 49);
                if (realVerts.length > 0) {
                    const opt = realVerts.reduce((best, v) =>
                        c1 * v.x + c2 * v.y < c1 * best.x + c2 * best.y ? v : best
                    );
                    const optVal = c1 * opt.x + c2 * opt.y;
                    const op = toCanvas(opt.x, opt.y);

                    // Red dot
                    ctx.beginPath(); ctx.arc(op.x, op.y, 7, 0, Math.PI * 2);
                    ctx.fillStyle = '#e94560'; ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

                    // Label
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif';
                    ctx.fillText(`(${opt.x.toFixed(2)}, ${opt.y.toFixed(2)})`, op.x + 10, op.y - 8);
                    ctx.fillStyle = '#ffcc00'; ctx.font = '11px sans-serif';
                    ctx.fillText(`f = ${optVal.toFixed(2)}`, op.x + 10, op.y + 8);
                }
            }

            // Draggable rect handles (always on top of feasible region)
            rect.drawHandles(ctx, toCanvas);

            // Constraint boundary lines
            for (let i = 0; i < constraints.length; i++) {
                const c = constraints[i];
                let p1, p2;
                if (Math.abs(c.a2) > 1e-10) {
                    p1 = toCanvas(-rX - 1, (c.b - c.a1 * (-rX - 1)) / c.a2);
                    p2 = toCanvas( rX + 1, (c.b - c.a1 * ( rX + 1)) / c.a2);
                } else if (Math.abs(c.a1) > 1e-10) {
                    const x1 = c.b / c.a1;
                    p1 = toCanvas(x1, -rY - 1);
                    p2 = toCanvas(x1,  rY + 1);
                } else continue;
                ctx.strokeStyle = LINE_COLORS[i % LINE_COLORS.length];
                ctx.lineWidth = 1.5;
                ctx.setLineDash([6, 4]); ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        document.getElementById('c1').addEventListener('input', draw);
        document.getElementById('c2').addEventListener('input', draw);
        window.addEventListener('resize', () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; draw(); });

        // Draggable rectangle — starts as [-4, 4] × [-4, 4]
        const rect = new DraggableRect(-4, 4, -4, 4);
        rect.onChange = draw;

        // init
        canvas.width  = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        rect.attach(canvas, toCanvas, toWorld);
        draw();
    </script>
</body>
</html>
